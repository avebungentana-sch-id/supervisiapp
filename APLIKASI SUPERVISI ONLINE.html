          date: '', teacherId: isGuru ? currentUser.id : '', subject: '', kelas: '', material: '', supervisor: '', status: 'Menunggu Persetujuan'
        });

        const displayedSchedules = currentSchedules.filter(s => isAdmin || s.teacherId === currentUser.id).sort((a, b) => new Date(a.date) - new Date(b.date)); 

        const handleSubmitSchedule = async (e) => {
          e.preventDefault();
          if (!formData.date || !formData.teacherId || !formData.subject || !formData.kelas || !formData.supervisor || !formData.material) {
             alert('Mohon lengkapi semua isian formulir jadwal.'); return;
          }

          try {
            const { doc, setDoc, updateDoc } = window.FirebaseSDK;
            if (editingScheduleId) {
               await updateDoc(doc(db, "schedules", editingScheduleId), formData);
               setEditingScheduleId(null);
            } else {
               const newId = Date.now().toString();
               await setDoc(doc(db, "schedules", newId), { id: newId, ...formData, academicYear: selectedYear });
            }
            setFormData({ date: '', teacherId: isGuru ? currentUser.id : '', subject: '', kelas: '', material: '', supervisor: '', status: 'Menunggu Persetujuan' });
          } catch(err) { alert("Gagal menyimpan jadwal: " + err.message); }
        };

        const handleEditSchedule = (schedule) => {
          setFormData({
             date: schedule.date, teacherId: schedule.teacherId, subject: schedule.subject,
             kelas: schedule.kelas || '', material: schedule.material, supervisor: schedule.supervisor, status: schedule.status || 'Menunggu Persetujuan'
          });
          setEditingScheduleId(schedule.id);
        };

        const handleCancelEdit = () => {
          setEditingScheduleId(null);
          setFormData({ date: '', teacherId: isGuru ? currentUser.id : '', subject: '', kelas: '', material: '', supervisor: '', status: 'Menunggu Persetujuan' });
        };

        const handleDeleteSchedule = async (id) => {
          if (confirm('Hapus jadwal supervisi ini?')) {
            try {
               const { doc, deleteDoc } = window.FirebaseSDK;
               await deleteDoc(doc(db, "schedules", id));
               if(editingScheduleId === id) handleCancelEdit();
            } catch (err) { alert("Gagal menghapus: " + err.message); }
          }
        };

        const handleStatusChange = async (id, newStatus) => {
           try {
             const { doc, updateDoc } = window.FirebaseSDK;
             await updateDoc(doc(db, "schedules", id), { status: newStatus });
           } catch(err) { alert("Gagal ubah status: " + err.message); }
        };

        const formatDate = (dateString) => { return new Date(dateString).toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }); };

        return (
          <div className="p-8 max-w-7xl mx-auto animate-in fade-in duration-300">
            <div className="mb-8 flex flex-col md:flex-row justify-between md:items-end gap-4">
              <div>
                <h2 className="text-3xl font-bold text-slate-800 tracking-tight">Rencana Supervisi</h2>
                <p className="text-slate-500 mt-1">{isGuru ? 'Ajukan jadwal supervisi Anda.' : 'Atur dan verifikasi pengajuan jadwal pelaksanaan supervisi.'}</p>
              </div>
              <div className="flex items-center gap-3 bg-white p-2 rounded-xl border border-slate-200 shadow-sm">
                <FolderOpen className="w-5 h-5 text-slate-400 ml-2" />
                <select value={selectedYear} onChange={(e) => setSelectedYear(e.target.value)} className="bg-transparent text-slate-700 font-medium py-2 px-4 focus:outline-none cursor-pointer appearance-none pr-8">
                  {schoolInfo.availableYears && schoolInfo.availableYears.map(year => (
                    <option key={year} value={year}>{year}</option>
                  ))}
                </select>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
              {/* Form Input */}
              <div className="lg:col-span-1">
                <div className={`bg-white rounded-2xl border ${editingScheduleId ? 'border-amber-400 ring-2 ring-amber-50' : 'border-slate-200'} shadow-sm p-6 sticky top-8 transition-all`}>
                   <h3 className="text-lg font-bold text-slate-800 mb-5 flex items-center gap-2">
                     <Calendar className={`w-5 h-5 ${editingScheduleId ? 'text-amber-500' : 'text-indigo-500'}`} /> 
                     {editingScheduleId ? 'Edit Jadwal' : (isGuru ? 'Ajukan Jadwal' : 'Tambah Jadwal')}
                   </h3>
                   {isAdmin && currentTeachers.length === 0 ? (
                      <p className="text-sm text-amber-600 bg-amber-50 p-3 rounded-lg border border-amber-100">Silakan tambahkan Data Guru di tahun ajaran ini terlebih dahulu.</p>
                   ) : (
                     <form onSubmit={handleSubmitSchedule} className="space-y-4">
                        <div>
                          <label className="block text-sm font-semibold text-slate-700 mb-1.5">Tanggal Pelaksanaan</label>
                          <input type="date" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm" required />
                        </div>
                        {isAdmin && (
                          <div>
                            <label className="block text-sm font-semibold text-slate-700 mb-1.5">Pilih Guru</label>
                            <select value={formData.teacherId} onChange={e => setFormData({...formData, teacherId: e.target.value})} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm" required>
                              <option value="">-- Pilih Guru --</option>
                              {currentTeachers.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                            </select>
                          </div>
                        )}
                        <div>
                          <label className="block text-sm font-semibold text-slate-700 mb-1.5">Mata Pelajaran</label>
                          <input type="text" value={formData.subject} onChange={e => setFormData({...formData, subject: e.target.value})} placeholder="Contoh: Matematika" className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm" required />
                        </div>
                        <div>
                          <label className="block text-sm font-semibold text-slate-700 mb-1.5">Kelas</label>
                          <input type="text" value={formData.kelas} onChange={e => setFormData({...formData, kelas: e.target.value})} placeholder="Contoh: X IPA 1" className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm" required />
                        </div>
                        <div>
                          <label className="block text-sm font-semibold text-slate-700 mb-1.5">Materi Ajar</label>
                          <input type="text" value={formData.material} onChange={e => setFormData({...formData, material: e.target.value})} placeholder="Contoh: Aljabar Linear" className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm" required />
                        </div>
                        <div>
                          <label className="block text-sm font-semibold text-slate-700 mb-1.5">Nama Supervisor</label>
                          <input type="text" value={formData.supervisor} onChange={e => setFormData({...formData, supervisor: e.target.value})} placeholder="Nama penilai..." className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm" required />
                        </div>
                        
                        {isAdmin && editingScheduleId && (
                           <div>
                             <label className="block text-sm font-semibold text-slate-700 mb-1.5">Status Persetujuan</label>
                             <select value={formData.status} onChange={e => setFormData({...formData, status: e.target.value})} className="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500/50 text-sm font-semibold">
                                <option value="Menunggu Persetujuan">Menunggu Persetujuan</option>
                                <option value="Disetujui">Disetujui</option>
                                <option value="Ditolak">Ditolak</option>
                             </select>
                           </div>
                        )}

                        <div className="pt-2 flex flex-col gap-2">
                          <button type="submit" className={`w-full text-white px-4 py-3 rounded-xl transition font-medium flex justify-center items-center gap-2 ${editingScheduleId ? 'bg-amber-500 hover:bg-amber-600' : 'bg-indigo-600 hover:bg-indigo-700'}`}>
                            {editingScheduleId ? <Save className="w-4 h-4" /> : <Plus className="w-4 h-4" />} 
                            {editingScheduleId ? 'Perbarui Jadwal' : (isGuru ? 'Ajukan Jadwal' : 'Simpan Jadwal')}
                          </button>
                          {editingScheduleId && (
                             <button type="button" onClick={handleCancelEdit} className="w-full bg-slate-200 text-slate-700 px-4 py-3 rounded-xl hover:bg-slate-300 transition font-medium flex justify-center items-center gap-2">
                               <X className="w-4 h-4" /> Batal Edit
                             </button>
                          )}
                        </div>
                     </form>
                   )}
                </div>
              </div>

              {/* Tabel Jadwal */}
              <div className="lg:col-span-2">
                <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col h-full">
                  <div className="p-6 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                    <div className="flex items-center gap-3">
                      <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <Activity className="w-5 h-5 text-indigo-500" /> Daftar Jadwal ({selectedYear})
                      </h3>
                      <span className="bg-indigo-100 text-indigo-800 text-xs font-semibold px-2.5 py-1 rounded-full">{displayedSchedules.length} Jadwal</span>
                    </div>
                  </div>
                  
                  <div className="overflow-x-auto flex-1">
                    <table className="w-full text-left border-collapse">
                      <thead>
                        <tr className="bg-slate-50 text-slate-500 text-sm border-b border-slate-200">
                          <th className="px-6 py-4 font-semibold w-16 text-center">No</th>
                          <th className="px-6 py-4 font-semibold min-w-[150px]">Tanggal</th>
                          {isAdmin && <th className="px-6 py-4 font-semibold min-w-[150px]">Guru</th>}
                          <th className="px-6 py-4 font-semibold min-w-[150px]">Rincian</th>
                          <th className="px-6 py-4 font-semibold min-w-[130px] text-center">Status</th>
                          <th className="px-6 py-4 font-semibold w-24 text-center">Aksi</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100">
                        {displayedSchedules.map((schedule, index) => {
                          const teacher = currentTeachers.find(t => t.id === schedule.teacherId);
                          const isBeingEdited = editingScheduleId === schedule.id;
                          const currentStatus = schedule.status || 'Menunggu Persetujuan';
                          
                          let statusColor = "bg-amber-100 text-amber-800";
                          if (currentStatus === 'Disetujui') statusColor = "bg-emerald-100 text-emerald-800";
                          if (currentStatus === 'Ditolak') statusColor = "bg-red-100 text-red-800";

                          const canEdit = isAdmin || currentStatus === 'Menunggu Persetujuan';

                          return (
                            <tr key={schedule.id} className={`transition-colors ${isBeingEdited ? 'bg-amber-50/50' : 'hover:bg-slate-50/50'}`}>
                              <td className="px-6 py-4 text-center text-slate-500">{index + 1}</td>
                              <td className="px-6 py-4"><span className="font-medium text-slate-800 text-sm block">{formatDate(schedule.date)}</span></td>
                              {isAdmin && (<td className="px-6 py-4"><span className="font-bold text-indigo-700 block">{teacher ? teacher.name : 'Guru Dihapus'}</span></td>)}
                              <td className="px-6 py-4">
                                <span className="font-semibold text-slate-800 text-sm block">{schedule.subject} - {schedule.kelas}</span>
                                <span className="text-xs text-slate-500 mt-0.5 block">Mat: {schedule.material}</span>
                                <span className="text-xs text-slate-500 block">Sup: {schedule.supervisor}</span>
                              </td>
                              <td className="px-6 py-4 text-center">
                                {isAdmin ? (
                                   <select value={currentStatus} onChange={(e) => handleStatusChange(schedule.id, e.target.value)} className={`text-xs font-bold px-2 py-1.5 rounded outline-none cursor-pointer ${statusColor}`}>
                                      <option value="Menunggu Persetujuan">Menunggu</option><option value="Disetujui">Disetujui</option><option value="Ditolak">Ditolak</option>
                                   </select>
                                ) : (<span className={`inline-block px-2.5 py-1 rounded-full text-xs font-bold ${statusColor}`}>{currentStatus}</span>)}
                              </td>
                              <td className="px-6 py-4 text-center">
                                <div className="flex items-center justify-center gap-1">
                                  {canEdit ? (
                                     <>
                                        <button onClick={() => handleEditSchedule(schedule)} className={`p-1.5 rounded-lg transition-colors ${isBeingEdited ? 'text-amber-600 bg-amber-100' : 'text-slate-400 hover:text-blue-600 hover:bg-blue-50'}`} title="Edit"><Pen className="w-4 h-4" /></button>
                                        <button onClick={() => handleDeleteSchedule(schedule.id)} className="p-1.5 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="Hapus"><Trash2 className="w-4 h-4" /></button>
                                     </>
                                  ) : (<span className="text-xs text-slate-400 italic">Terkunci</span>)}
                                </div>
                              </td>
                            </tr>
                          );
                        })}
                        {displayedSchedules.length === 0 && (
                          <tr><td colSpan={isAdmin ? 6 : 5} className="px-6 py-16 text-center text-slate-400">Belum ada jadwal yang {isGuru ? 'Anda ajukan' : 'terdaftar'} untuk tahun ajaran ini.</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      };

      // --- 2. Teachers Data Component (HANYA ADMIN) ---
      const TeachersData = () => {
        const [newTeacherName, setNewTeacherName] = useState('');
        const [newTeacherUsername, setNewTeacherUsername] = useState('');
        const [newTeacherPassword, setNewTeacherPassword] = useState('123456');
        
        const [editingId, setEditingId] = useState(null);
        const [editName, setEditName] = useState('');
        const [editUsername, setEditUsername] = useState('');
        const [editPassword, setEditPassword] = useState('');

        const handleAddTeacher = async (e) => {
          e.preventDefault();
          if (!newTeacherName.trim() || !newTeacherUsername.trim()) return;
          const safeUsername = newTeacherUsername.toLowerCase().trim();
          if (teachers.some(t => t.username === safeUsername)) { alert('Username sudah digunakan.'); return; }

          const email = `${safeUsername}@supervisi.app`;
          
          try {
             const { initializeApp, getAuth, createUserWithEmailAndPassword, doc, setDoc } = window.FirebaseSDK;
             
             // Gunakan instance terpisah agar Admin tidak ter-logout saat membuat user baru
             const firebaseConfig = { apiKey: "AIzaSyA6s-Dl45Sms932s9EI-Qb4EU2-xnDrTZ4", authDomain: "supervisi-app.firebaseapp.com", projectId: "supervisi-app" };
             const secondaryApp = window.secondaryFirebaseApp || initializeApp(firebaseConfig, "SecondaryApp");
             window.secondaryFirebaseApp = secondaryApp;
             const secondaryAuth = getAuth(secondaryApp);

             let newId = Date.now().toString();
             try {
                const userCred = await createUserWithEmailAndPassword(secondaryAuth, email, newTeacherPassword);
                newId = userCred.user.uid; // Kunci: ID Guru di Firestore = UID di Firebase Auth
             } catch(err) {
                if (err.code === 'auth/email-already-in-use') {
                   alert('Peringatan: Username ini sudah pernah didaftarkan di sistem Auth. Silakan gunakan username lain.');
                   return;
                } else { throw err; }
             }
             await secondaryAuth.signOut();

             const teacherData = { id: newId, name: newTeacherName, username: safeUsername, password: newTeacherPassword, academicYear: selectedYear };
             await setDoc(doc(db, "teachers", newId), teacherData);
             setNewTeacherName(''); setNewTeacherUsername(''); setNewTeacherPassword('123456');
          } catch(err) { alert("Gagal Tambah: " + err.message); }
        };

        const handleStartEdit = (teacher) => {
          setEditingId(teacher.id); setEditName(teacher.name); setEditUsername(teacher.username || ''); setEditPassword(teacher.password || '');
        };

        const handleSaveEdit = async (e) => {
          e.preventDefault();
          if (!editName.trim() || !editUsername.trim()) return;
          if (teachers.some(t => t.id !== editingId && t.username === editUsername.trim())) { alert('Username sudah digunakan.'); return; }

          try {
             const { doc, updateDoc } = window.FirebaseSDK;
             await updateDoc(doc(db, "teachers", editingId), { name: editName, username: editUsername.trim(), password: editPassword });
             setEditingId(null);
          } catch(err) { alert("Gagal Simpan: " + err.message); }
        };

        const handleDeleteTeacher = async (id) => {
          if(confirm('Hapus guru ini? Akun login dan data supervisinya akan ikut terhapus.')) {
            try {
               const { doc, deleteDoc } = window.FirebaseSDK;
               await deleteDoc(doc(db, "teachers", id));
            } catch(err) { alert("Gagal Menghapus: " + err.message); }
          }
        };

        const openSupervision = (teacher) => {
          if(currentCategories.length === 0) { alert("Harap tambahkan kategori supervisi terlebih dahulu pada tahun ajaran ini."); return; }
          setSelectedTeacher(teacher); setIsSupervisionModalOpen(true);
        };

        useEffect(() => {
           if(newTeacherName && !newTeacherUsername) setNewTeacherUsername(newTeacherName.toLowerCase().replace(/[^a-z0-9]/g, '').substring(0,10));
        }, [newTeacherName]);

        return (
          <div className="p-8 max-w-7xl mx-auto animate-in fade-in duration-300">
            <div className="mb-8 flex flex-col md:flex-row justify-between md:items-end gap-4">
              <div>
                <h2 className="text-3xl font-bold text-slate-800 tracking-tight">Manajemen Guru & Akun</h2>
                <p className="text-slate-500 mt-1">Kelola data guru, buatkan akun login, dan lakukan verifikasi supervisi ({selectedYear}).</p>
              </div>
              <div className="flex items-center gap-3 bg-white p-2 rounded-xl border border-slate-200 shadow-sm">
                <FolderOpen className="w-5 h-5 text-slate-400 ml-2" />
                <select value={selectedYear} onChange={(e) => setSelectedYear(e.target.value)} className="bg-transparent text-slate-700 font-medium py-2 px-4 focus:outline-none cursor-pointer appearance-none pr-8">
                  {schoolInfo.availableYears && schoolInfo.availableYears.map(year => (
                    <option key={year} value={year}>{year}</option>
                  ))}
                </select>
              </div>
            </div>

            <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col mb-8">
              <div className="p-6 border-b border-slate-100 bg-slate-50/50">
                <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2 mb-4">
                  <UserCircle className="w-5 h-5 text-indigo-500" /> Tambah Guru & Buat Akun
                </h3>
                <form onSubmit={handleAddTeacher} className="flex flex-col md:flex-row gap-4 items-end">
                  <div className="flex-1 w-full">
                     <label className="block text-xs font-bold text-slate-500 mb-1">Nama Lengkap</label>
                     <input type="text" value={newTeacherName} onChange={(e) => setNewTeacherName(e.target.value)} placeholder="Nama Lengkap Guru..." className="w-full px-4 py-2 bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-colors text-sm" required />
                  </div>
                  <div className="w-full md:w-48">
                     <label className="block text-xs font-bold text-slate-500 mb-1">Username Login</label>
                     <input type="text" value={newTeacherUsername} onChange={(e) => setNewTeacherUsername(e.target.value)} placeholder="username..." className="w-full px-4 py-2 bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-colors text-sm" required />
                  </div>
                  <div className="w-full md:w-40">
                     <label className="block text-xs font-bold text-slate-500 mb-1">Password</label>
                     <input type="text" value={newTeacherPassword} onChange={(e) => setNewTeacherPassword(e.target.value)} placeholder="Password..." className="w-full px-4 py-2 bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-colors text-sm" required />
                  </div>
                  <button type="submit" className="w-full md:w-auto bg-indigo-600 text-white px-6 py-2 rounded-xl hover:bg-indigo-700 transition flex items-center justify-center gap-2 text-sm font-medium h-[38px]">
                    <Plus className="w-4 h-4" /> Tambah
                  </button>
                </form>
              </div>
              
              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse">
                  <thead>
                    <tr className="bg-slate-50 text-slate-500 text-sm border-b border-slate-200">
                      <th className="px-6 py-4 font-semibold w-16 text-center">No</th>
                      <th className="px-6 py-4 font-semibold min-w-[200px]">Data Guru & Akun</th>
                      <th className="px-6 py-4 font-semibold w-48 text-center">Progres Terverifikasi</th>
                      <th className="px-6 py-4 font-semibold w-40 text-center">Status</th>
                      <th className="px-6 py-4 font-semibold min-w-[150px] text-center">Verifikasi</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {currentTeachers.map((t, index) => {
                      const prog = getTeacherProgress(t.id);
                      const isComplete = prog.percentage === 100;
                      return (
                        <tr key={t.id} className="hover:bg-slate-50/50 transition-colors">
                          <td className="px-6 py-4 text-center text-slate-500">{index + 1}</td>
                          <td className="px-6 py-4">
                            {editingId === t.id ? (
                              <form onSubmit={handleSaveEdit} className="flex flex-col gap-2 bg-slate-50 p-3 rounded-lg border border-indigo-100">
                                <div><label className="text-xs font-semibold text-slate-500">Nama:</label><input autoFocus type="text" value={editName} onChange={(e) => setEditName(e.target.value)} className="w-full px-2 py-1 border border-indigo-300 rounded focus:outline-none focus:ring-1 focus:ring-indigo-500 text-sm" /></div>
                                <div className="flex gap-2">
                                  <div className="flex-1"><label className="text-xs font-semibold text-slate-500">User:</label><input type="text" value={editUsername} onChange={(e) => setEditUsername(e.target.value)} className="w-full px-2 py-1 border border-indigo-300 rounded focus:outline-none focus:ring-1 focus:ring-indigo-500 text-sm" /></div>
                                  <div className="flex-1"><label className="text-xs font-semibold text-slate-500">Pass:</label><input type="text" value={editPassword} onChange={(e) => setEditPassword(e.target.value)} className="w-full px-2 py-1 border border-indigo-300 rounded focus:outline-none focus:ring-1 focus:ring-indigo-500 text-sm" /></div>
                                </div>
                                <div className="flex gap-2 mt-1">
                                  <button type="submit" className="flex-1 bg-emerald-50 text-emerald-700 text-xs py-1 rounded font-bold border border-emerald-200">Simpan</button>
                                  <button type="button" onClick={() => setEditingId(null)} className="flex-1 bg-slate-200 text-slate-700 text-xs py-1 rounded font-bold">Batal</button>
                                </div>
                              </form>
                            ) : (
                              <div>
                                 <span className="font-bold text-slate-800 block">{t.name}</span>
                                 <span className="text-xs text-slate-500 flex items-center gap-1 mt-1"><Key className="w-3 h-3"/> User: <strong>{t.username}</strong> | Pass: {t.password}</span>
                              </div>
                            )}
                          </td>
                          <td className="px-6 py-4 text-center">
                            <div className="flex flex-col items-center justify-center gap-1">
                              <div className="flex items-center gap-2 w-full justify-center">
                                <div className="w-24 bg-slate-200 rounded-full h-2 overflow-hidden">
                                  <div className={`h-2 rounded-full ${isComplete ? 'bg-emerald-500' : 'bg-indigo-500'}`} style={{ width: `${prog.percentage}%` }}></div>
                                </div>
                                <span className="text-xs font-semibold text-slate-600 w-8">{prog.percentage}%</span>
                              </div>
                              {prog.isPendingVerif && <span className="text-[10px] bg-amber-100 text-amber-700 px-2 rounded-full font-bold">Ada Pengajuan Baru</span>}
                            </div>
                          </td>
                          <td className="px-6 py-4 text-center">
                            {prog.percentage === 0 ? (
                               <span className="inline-flex items-center px-2.5 py-1 rounded-full bg-slate-100 text-slate-600 text-xs font-medium">Belum Verifikasi</span>
                            ) : isComplete ? (
                               <span className="inline-flex items-center px-2.5 py-1 rounded-full bg-emerald-50 text-emerald-700 border border-emerald-100 text-xs font-medium">Selesai 100%</span>
                            ) : (
                               <span className="inline-flex items-center px-2.5 py-1 rounded-full bg-blue-50 text-blue-700 border border-blue-100 text-xs font-medium">Proses Verifikasi</span>
                            )}
                          </td>
                          <td className="px-6 py-4 text-center">
                            <div className="flex items-center justify-center gap-2">
                              <button onClick={() => openSupervision(t)} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors border ${prog.isPendingVerif ? 'bg-amber-500 text-white border-amber-600 hover:bg-amber-600 shadow-md animate-pulse' : 'bg-indigo-50 text-indigo-600 border-indigo-100 hover:bg-indigo-600 hover:text-white'}`}>
                                <ClipboardList className="w-3.5 h-3.5" /> {prog.isPendingVerif ? 'Verifikasi' : 'Buka Data'}
                              </button>
                              {!editingId && (
                                <>
                                  <button onClick={() => handleStartEdit(t)} className="p-1.5 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors"><Pen className="w-4 h-4" /></button>
                                  <button onClick={() => handleDeleteTeacher(t.id)} className="p-1.5 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors"><Trash2 className="w-4 h-4" /></button>
                                </>
                              )}
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                    {currentTeachers.length === 0 && (
                      <tr><td colSpan="5" className="px-6 py-12 text-center text-slate-400">Belum ada data guru di tahun ajaran ini. Silakan tambahkan di atas.</td></tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
      };

      // --- 3. Master Data Component (HANYA ADMIN) ---
      const MasterData = () => {
        const [newCategoryName, setNewCategoryName] = useState('');
        const [newCategoryWeight, setNewCategoryWeight] = useState(''); 
        const [activeSubFormId, setActiveSubFormId] = useState(null);
        const [newSubCategoryName, setNewSubCategoryName] = useState('');
        const [editingCategoryId, setEditingCategoryId] = useState(null);
        const [editCategoryName, setEditCategoryName] = useState('');
        const [editCategoryWeight, setEditCategoryWeight] = useState('');
        const [editingSubCategory, setEditingSubCategory] = useState({ parentId: null, subId: null });
        const [editSubCategoryName, setEditSubCategoryName] = useState('');

        const handleAddCategory = async (e) => {
          e.preventDefault();
          if (!newCategoryName.trim() || !newCategoryWeight) return;
          const weightNum = parseFloat(newCategoryWeight);
          if (isNaN(weightNum) || weightNum <= 0) { alert("Bobot harus positif."); return; }
          
          try {
             const newId = Date.now().toString();
             const { doc, setDoc } = window.FirebaseSDK;
             await setDoc(doc(db, "categories", newId), { id: newId, name: newCategoryName, weight: weightNum, subCategories: [], academicYear: selectedYear });
             setNewCategoryName(''); setNewCategoryWeight('');
          } catch(err) { alert("Error: " + err.message); }
        };

        const handleStartEditCategory = (cat) => { setEditingCategoryId(cat.id); setEditCategoryName(cat.name); setEditCategoryWeight(cat.weight); };

        const handleSaveEditCategory = async (e, id) => {
          e.preventDefault();
          if (!editCategoryName.trim() || !editCategoryWeight) return;
          const weightNum = parseFloat(editCategoryWeight);
          if (isNaN(weightNum) || weightNum <= 0) { alert("Bobot harus positif."); return; }
          
          try {
            const { doc, updateDoc } = window.FirebaseSDK;
            await updateDoc(doc(db, "categories", id), { name: editCategoryName, weight: weightNum });
            setEditingCategoryId(null);
          } catch(err) { alert("Error: " + err.message); }
        };

        const handleDeleteCategory = async (id) => {
          if(confirm('Hapus kategori ini?')) {
            try {
               const { doc, deleteDoc } = window.FirebaseSDK;
               await deleteDoc(doc(db, "categories", id));
            } catch(err) { alert("Error: " + err.message); }
          }
        };

        const handleAddSubCategory = async (e, parentId) => {
          e.preventDefault();
          if (!newSubCategoryName.trim()) return;
          const cat = categories.find(c => c.id === parentId);
          const newSub = { id: Date.now().toString(), name: newSubCategoryName };
          const updatedSubs = [...(cat.subCategories || []), newSub];
          
          try {
             const { doc, updateDoc } = window.FirebaseSDK;
             await updateDoc(doc(db, "categories", parentId), { subCategories: updatedSubs });
             setNewSubCategoryName(''); setActiveSubFormId(null);
          } catch(err) { alert("Error: " + err.message); }
        };

        const handleStartEditSubCategory = (parentId, sub) => { setEditingSubCategory({ parentId, subId: sub.id }); setEditSubCategoryName(sub.name); };

        const handleSaveEditSubCategory = async (e, parentId, subId) => {
          e.preventDefault();
          if (!editSubCategoryName.trim()) return;
          const cat = categories.find(c => c.id === parentId);
          const updatedSubs = cat.subCategories.map(s => s.id === subId ? { ...s, name: editSubCategoryName } : s);
          
          try {
            const { doc, updateDoc } = window.FirebaseSDK;
            await updateDoc(doc(db, "categories", parentId), { subCategories: updatedSubs });
            setEditingSubCategory({ parentId: null, subId: null });
          } catch(err) { alert("Error: " + err.message); }
        };

        const handleDeleteSubCategory = async (parentId, subId) => {
          if(confirm('Hapus sub kategori ini?')) {
            const cat = categories.find(c => c.id === parentId);
            const updatedSubs = cat.subCategories.filter(s => s.id !== subId);
            try {
               const { doc, updateDoc } = window.FirebaseSDK;
               await updateDoc(doc(db, "categories", parentId), { subCategories: updatedSubs });
            } catch(err) { alert("Error: " + err.message); }
          }
        };

        return (
          <div className="p-8 max-w-4xl mx-auto animate-in fade-in duration-300">
            <div className="mb-8 flex flex-col md:flex-row justify-between md:items-end gap-4">
              <div>
                <h2 className="text-3xl font-bold text-slate-800 tracking-tight">Kategori Supervisi</h2>
                <p className="text-slate-500 mt-1">Kelola daftar tahapan beserta rincian checklist dan bobot penilaiannya.</p>
              </div>
              <div className="flex items-center gap-3 bg-white p-2 rounded-xl border border-slate-200 shadow-sm">
                <FolderOpen className="w-5 h-5 text-slate-400 ml-2" />
                <select value={selectedYear} onChange={(e) => setSelectedYear(e.target.value)} className="bg-transparent text-slate-700 font-medium py-2 px-4 focus:outline-none cursor-pointer appearance-none pr-8">
                  {schoolInfo.availableYears && schoolInfo.availableYears.map(year => (
                    <option key={year} value={year}>{year}</option>
                  ))}
                </select>
              </div>
            </div>

            <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col min-h-[600px] mb-10">
              <div className="p-6 border-b border-slate-100 bg-slate-50/50">
                <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                  <Activity className="w-5 h-5 text-indigo-500" /> Daftar Tahapan / Kategori ({selectedYear})
                </h3>
              </div>
              <div className="p-6 flex-1 overflow-y-auto">
                <form onSubmit={handleAddCategory} className="flex flex-col md:flex-row gap-2 mb-8">
                  <input type="text" value={newCategoryName} onChange={(e) => setNewCategoryName(e.target.value)} placeholder="Misal: Administrasi Pembelajaran" className="flex-1 px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:bg-white" required />
                  <input type="number" step="0.1" value={newCategoryWeight} onChange={(e) => setNewCategoryWeight(e.target.value)} placeholder="Bobot (%)" className="w-full md:w-32 px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:bg-white" required />
                  <button type="submit" className="bg-indigo-600 text-white px-6 py-3 rounded-xl hover:bg-indigo-700 font-medium whitespace-nowrap">Tambah</button>
                </form>
                
                <div className="space-y-4">
                  {currentCategories.map((c, index) => (
                    <div key={c.id} className="rounded-xl border border-slate-200 bg-white overflow-hidden shadow-sm">
                      <div className="flex flex-col md:flex-row md:items-center justify-between p-4 bg-slate-50 border-b border-slate-100 gap-4">
                        
                        {editingCategoryId === c.id ? (
                          <form onSubmit={(e) => handleSaveEditCategory(e, c.id)} className="flex-1 flex flex-col md:flex-row items-center gap-2">
                             <span className="flex items-center justify-center w-8 h-8 rounded-full bg-indigo-100 text-indigo-700 font-bold shrink-0">{index + 1}</span>
                             <input autoFocus type="text" value={editCategoryName} onChange={(e) => setEditCategoryName(e.target.value)} placeholder="Nama Kategori" className="flex-1 w-full px-3 py-1.5 border border-indigo-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm" required />
                             <input type="number" step="0.1" value={editCategoryWeight} onChange={(e) => setEditCategoryWeight(e.target.value)} placeholder="Bobot" className="w-24 px-3 py-1.5 border border-indigo-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm" required />
                             <div className="flex gap-1 shrink-0">
                               <button type="submit" className="text-emerald-600 hover:text-emerald-700 hover:bg-emerald-50 p-2 rounded-lg transition-colors"><Save className="w-4 h-4" /></button>
                               <button type="button" onClick={() => setEditingCategoryId(null)} className="text-slate-400 hover:text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors"><X className="w-4 h-4" /></button>
                             </div>
                          </form>
                        ) : (
                          <div className="flex items-center gap-4 flex-1">
                            <span className="flex items-center justify-center w-8 h-8 rounded-full bg-indigo-100 text-indigo-700 font-bold shrink-0">{index + 1}</span>
                            <div>
                              <span className="font-bold text-slate-800 block">{c.name}</span>
                              <span className="text-xs font-semibold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded border border-emerald-100 inline-block mt-1">Bobot Kategori: {c.weight || 0}%</span>
                            </div>
                          </div>
                        )}

                        {editingCategoryId !== c.id && (
                          <div className="flex gap-2 self-start md:self-center shrink-0">
                             <button onClick={() => setActiveSubFormId(activeSubFormId === c.id ? null : c.id)} className="text-indigo-600 hover:bg-indigo-100 px-3 py-1 rounded-lg text-sm font-medium border border-indigo-200 bg-white">
                               <Plus className="w-3.5 h-3.5 mr-1 inline" /> Sub Checklist
                             </button>
                             <button onClick={() => handleStartEditCategory(c)} className="text-slate-400 hover:text-blue-600 p-1.5 rounded-lg hover:bg-blue-50 transition-all"><Pen className="w-4 h-4" /></button>
                             <button onClick={() => handleDeleteCategory(c.id)} className="text-slate-400 hover:text-red-600 p-1.5 rounded-lg hover:bg-red-50 transition-all"><Trash2 className="w-4 h-4" /></button>
                          </div>
                        )}
                      </div>

                      <div className="p-4">
                        {(!c.subCategories || c.subCategories.length === 0) ? (
                          <div className="text-sm text-slate-400 italic px-4 py-2 bg-slate-50 rounded-lg border border-dashed border-slate-200">
                            Tidak ada sub-checklist. Kategori ini dinilai sebagai 1 item langsung.
                          </div>
                        ) : (
                          <ul className="space-y-2">
                            {c.subCategories.map((sub, subIdx) => {
                              const isEditingThisSub = editingSubCategory.parentId === c.id && editingSubCategory.subId === sub.id;

                              return (
                                <li key={sub.id} className={`flex items-center justify-between p-3 rounded-lg border hover:border-slate-300 transition-colors bg-white group ml-4 ${isEditingThisSub ? 'border-indigo-300 ring-2 ring-indigo-50' : 'border-slate-100'}`}>
                                  {isEditingThisSub ? (
                                     <form onSubmit={(e) => handleSaveEditSubCategory(e, c.id, sub.id)} className="flex-1 flex items-center gap-2 w-full">
                                        <LevelDownAlt className="w-4 h-4 text-slate-300 shrink-0" />
                                        <input autoFocus type="text" value={editSubCategoryName} onChange={(e) => setEditSubCategoryName(e.target.value)} className="flex-1 px-3 py-1.5 border border-indigo-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm" required />
                                        <div className="flex gap-1 shrink-0">
                                          <button type="submit" className="text-emerald-600 hover:text-emerald-700 hover:bg-emerald-50 p-1.5 rounded-lg transition-colors"><Save className="w-4 h-4" /></button>
                                          <button type="button" onClick={() => setEditingSubCategory({parentId: null, subId: null})} className="text-slate-400 hover:text-red-500 hover:bg-red-50 p-1.5 rounded-lg transition-colors"><X className="w-4 h-4" /></button>
                                        </div>
                                     </form>
                                  ) : (
                                     <>
                                        <div className="flex items-center gap-3 flex-1">
                                          <LevelDownAlt className="w-4 h-4 text-slate-300 shrink-0" />
                                          <span className="text-slate-700">{sub.name}</span>
                                        </div>
                                        <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                          <button onClick={() => handleStartEditSubCategory(c.id, sub)} className="text-slate-300 hover:text-blue-500 p-1.5 rounded-lg transition-colors"><Pen className="w-4 h-4" /></button>
                                          <button onClick={() => handleDeleteSubCategory(c.id, sub.id)} className="text-slate-300 hover:text-red-500 p-1.5 rounded-lg transition-colors"><Trash2 className="w-4 h-4" /></button>
                                        </div>
                                     </>
                                  )}
                                </li>
                              )
                            })}
                          </ul>
                        )}

                        {activeSubFormId === c.id && (
                          <form onSubmit={(e) => handleAddSubCategory(e, c.id)} className="mt-3 ml-4 flex gap-2 animate-in fade-in slide-in-from-top-1">
                            <input autoFocus type="text" value={newSubCategoryName} onChange={(e) => setNewSubCategoryName(e.target.value)} placeholder="Contoh: RPP, Silabus..." className="flex-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm" required />
                            <button type="submit" className="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition text-sm font-medium">Simpan</button>
                            <button type="button" onClick={() => setActiveSubFormId(null)} className="bg-slate-200 text-slate-600 px-3 py-2 rounded-lg hover:bg-slate-300 transition text-sm"><X className="w-4 h-4" /></button>
                          </form>
                        )}
                      </div>
                    </div>
                  ))}
                  {currentCategories.length === 0 && (
                     <div className="text-center p-10 border-2 border-dashed border-slate-200 rounded-xl text-slate-400">
                        Belum ada kategori supervisi di tahun ajaran ini.
                     </div>
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      };

      // --- 4. Reports Data Component (HANYA ADMIN) ---
      const ReportsData = () => {
        const [reportMode, setReportMode] = useState('all');
        const [selectedTeacherId, setSelectedTeacherId] = useState('');

        return (
          <div className="p-8 max-w-5xl mx-auto animate-in fade-in duration-300">
            <div className="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
              <div>
                <h2 className="text-3xl font-bold text-slate-800 tracking-tight">Cetak Laporan</h2>
                <p className="text-slate-500 mt-1">Ekspor dan cetak hasil supervisi akademik dalam format resmi.</p>
              </div>
              <div className="flex items-center gap-3 bg-white p-2 rounded-xl border border-slate-200 shadow-sm">
                <FolderOpen className="w-5 h-5 text-slate-400 ml-2" />
                <select value={selectedYear} onChange={(e) => setSelectedYear(e.target.value)} className="bg-transparent text-slate-700 font-medium py-2 px-4 focus:outline-none cursor-pointer appearance-none pr-8">
                  {schoolInfo.availableYears && schoolInfo.availableYears.map(year => (
                    <option key={year} value={year}>{year}</option>
                  ))}
                </select>
              </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
              <div className={`bg-white rounded-2xl border ${reportMode === 'all' ? 'border-indigo-400 shadow-md ring-2 ring-indigo-50' : 'border-slate-200 shadow-sm'} p-6 transition-all cursor-pointer`} onClick={() => setReportMode('all')}>
                <div className="flex items-start gap-4 mb-4">
                  <div className={`w-12 h-12 rounded-full flex items-center justify-center shrink-0 ${reportMode === 'all' ? 'bg-indigo-100 text-indigo-600' : 'bg-slate-100 text-slate-500'}`}>
                     <Users className="w-6 h-6" />
                  </div>
                  <div>
                    <h3 className="text-xl font-bold text-slate-800">Laporan Keseluruhan</h3>
                    <p className="text-sm text-slate-500 mt-1">Cetak laporan rekapitulasi progres seluruh guru dalam satu dokumen.</p>
                  </div>
                </div>
                
                {reportMode === 'all' && (
                  <div className="mt-6 space-y-3 pt-6 border-t border-slate-100 animate-in fade-in slide-in-from-top-2">
                    <button onClick={handleExportPDF} disabled={currentTeachers.length === 0} className="w-full flex items-center justify-center gap-2 bg-indigo-600 text-white px-4 py-3 rounded-xl hover:bg-indigo-700 transition font-medium disabled:opacity-50 disabled:cursor-not-allowed">
                      <FileText className="w-5 h-5" /> Cetak PDF (Format Resmi)
                    </button>
                    <button onClick={handleExportCSV} disabled={currentTeachers.length === 0} className="w-full flex items-center justify-center gap-2 bg-white text-slate-700 border border-slate-200 px-4 py-3 rounded-xl hover:bg-slate-50 transition font-medium disabled:opacity-50 disabled:cursor-not-allowed">
                      <Download className="w-5 h-5" /> Unduh Data CSV (Excel)
                    </button>
                  </div>
                )}
              </div>

              <div className={`bg-white rounded-2xl border ${reportMode === 'individual' ? 'border-indigo-400 shadow-md ring-2 ring-indigo-50' : 'border-slate-200 shadow-sm'} p-6 transition-all cursor-pointer`} onClick={() => setReportMode('individual')}>
                <div className="flex items-start gap-4 mb-4">
                  <div className={`w-12 h-12 rounded-full flex items-center justify-center shrink-0 ${reportMode === 'individual' ? 'bg-indigo-100 text-indigo-600' : 'bg-slate-100 text-slate-500'}`}>
                     <UserCircle className="w-6 h-6" />
                  </div>
                  <div>
                    <h3 className="text-xl font-bold text-slate-800">Laporan Per Guru</h3>
                    <p className="text-sm text-slate-500 mt-1">Cetak lembar hasil supervisi individual lengkap dengan rincian tahapannya.</p>
                  </div>
                </div>

                {reportMode === 'individual' && (
                  <div className="mt-6 pt-6 border-t border-slate-100 animate-in fade-in slide-in-from-top-2">
                    <label className="block text-sm font-semibold text-slate-700 mb-2">Pilih Guru:</label>
                    <select 
                      value={selectedTeacherId} 
                      onChange={(e) => setSelectedTeacherId(e.target.value)}
                      className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 mb-4"
                    >
                      <option value="">-- Pilih Guru --</option>
                      {currentTeachers.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                    </select>
                    
                    <button onClick={() => handleExportPDFPerTeacher(selectedTeacherId)} disabled={!selectedTeacherId} className="w-full flex items-center justify-center gap-2 bg-indigo-600 text-white px-4 py-3 rounded-xl hover:bg-indigo-700 transition font-medium disabled:opacity-50 disabled:cursor-not-allowed">
                      <Printer className="w-5 h-5" /> Cetak Laporan Guru (PDF)
                    </button>
                  </div>
                )}
              </div>
            </div>
            
            {!schoolInfo.wakasekName && (
              <div className="mt-8 bg-amber-50 border border-amber-200 rounded-xl p-4 flex items-start gap-3">
                <AlertCircle className="w-5 h-5 text-amber-600 shrink-0 mt-0.5" />
                <p className="text-sm text-amber-800">Anda belum mengisi nama <strong>Wakasek Kurikulum</strong> di menu Profil Sekolah. Tanda tangan pada dokumen PDF yang dicetak akan kosong. <button onClick={() => setActiveTab('school')} className="underline font-semibold hover:text-amber-900">Isi sekarang</button>.</p>
              </div>
            )}
          </div>
        );
      };

      // --- 5. School Data Component (HANYA ADMIN) ---
      const SchoolData = () => {
        const [formData, setFormData] = useState(schoolInfo);
        const [saveMessage, setSaveMessage] = useState('');
        const [newYear, setNewYear] = useState('');
        const [copyFromCurrent, setCopyFromCurrent] = useState(true);

        useEffect(() => { setFormData(schoolInfo); }, [schoolInfo]);

        const handleSaveSchool = async (e) => {
          e.preventDefault();
          try {
             const { doc, setDoc } = window.FirebaseSDK;
             await setDoc(doc(db, "schoolInfo", "main"), formData);
             
             if(formData.activeYear !== selectedYear) setSelectedYear(formData.activeYear);
             setSaveMessage('Data sekolah berhasil disimpan ke Firebase!');
             setTimeout(() => setSaveMessage(''), 3000);
          } catch(err) { alert("Gagal Simpan: " + err.message); }
        };

        const handleAddYear = async () => {
          if(!newYear.trim()) return;
          const formattedYear = newYear.trim();
          if(!formData.availableYears.includes(formattedYear)){
            const newSchoolData = { ...formData, availableYears: [...formData.availableYears, formattedYear].sort() };
            
            try {
               const { doc, setDoc } = window.FirebaseSDK;
               // Update school year list
               await setDoc(doc(db, "schoolInfo", "main"), newSchoolData);

               if(copyFromCurrent) {
                  // Generate batch of promises for copying records to new year
                  const teacherPromises = currentTeachers.map(t => {
                     const newId = 'T' + Date.now() + Math.random().toString(36).substring(2, 9);
                     return setDoc(doc(db, "teachers", newId), { ...t, id: newId, academicYear: formattedYear });
                  });
                  const catPromises = currentCategories.map(c => {
                     const newId = 'C' + Date.now() + Math.random().toString(36).substring(2, 9);
                     return setDoc(doc(db, "categories", newId), { ...c, id: newId, academicYear: formattedYear });
                  });
                  await Promise.all([...teacherPromises, ...catPromises]);
                  alert(`Berhasil membuat tahun ${formattedYear} dan menyalin ${currentTeachers.length} Guru beserta Kategori ke Firebase.`);
               } else {
                  alert(`Berhasil membuat tahun ${formattedYear} dengan data kosong.`);
               }
               setNewYear('');
            } catch(err) { alert("Error saat membuat tahun: " + err.message); }
          } else { alert('Tahun ajaran tersebut sudah ada.'); }
        };

        const handleDeleteYear = async (yearToDelete) => {
          if (formData.availableYears.length <= 1) { alert('Minimal harus ada 1 tahun ajaran.'); return; }
          if (confirm(`Hapus tahun ajaran ${yearToDelete}? Data lama tetap tersimpan di database namun tidak muncul di menu filter.`)) {
             const updatedYears = formData.availableYears.filter(y => y !== yearToDelete);
             const newSchoolData = { ...formData, availableYears: updatedYears, activeYear: formData.activeYear === yearToDelete ? updatedYears[0] : formData.activeYear };
             try {
                const { doc, setDoc } = window.FirebaseSDK;
                await setDoc(doc(db, "schoolInfo", "main"), newSchoolData);
             } catch(err) { alert("Error saat menghapus tahun: " + err.message); }
          }
        };

        return (
          <div className="p-8 max-w-4xl mx-auto animate-in fade-in duration-300">
            <div className="mb-8">
              <h2 className="text-3xl font-bold text-slate-800 tracking-tight">Profil Sekolah</h2>
              <p className="text-slate-500 mt-1">Kelola informasi dasar, identitas, pejabat, dan daftar tahun ajaran sekolah.</p>
            </div>
            <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
              <form onSubmit={handleSaveSchool} className="space-y-6">
                <div>
                  <label className="block text-sm font-semibold text-slate-700 mb-2">Nama Sekolah</label>
                  <input type="text" value={formData.name || ''} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50" placeholder="Contoh: SMA Negeri 1 Maju Bangsa" required />
                </div>
                <div>
                  <label className="block text-sm font-semibold text-slate-700 mb-2">Alamat Lengkap</label>
                  <textarea value={formData.address || ''} onChange={e => setFormData({...formData, address: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50" rows="3" placeholder="Jalan, Kota, Provinsi..." required></textarea>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div className="bg-indigo-50/50 p-4 rounded-xl border border-indigo-100 flex flex-col justify-center">
                    <label className="block text-sm font-semibold text-indigo-900 mb-2">Nama WAKASEK Kurikulum</label>
                    <input type="text" value={formData.wakasekName || ''} onChange={e => setFormData({...formData, wakasekName: e.target.value})} className="w-full px-4 py-2.5 bg-white border border-indigo-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50" placeholder="Budi Santoso, M.Pd." />
                    <p className="text-xs text-indigo-600 mt-2">Digunakan untuk kolom tanda tangan pada laporan PDF cetak.</p>
                  </div>
                  <div className="space-y-4">
                     <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                        <label className="block text-sm font-semibold text-slate-700 mb-2">Tahun Ajaran Aktif (Default)</label>
                        <select value={formData.activeYear || ''} onChange={e => setFormData({...formData, activeYear: e.target.value})} className="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 mb-4" required>
                           {formData.availableYears && formData.availableYears.map(y => <option key={y} value={y}>{y}</option>)}
                        </select>
                        
                        <label className="block text-sm font-semibold text-slate-700 mb-2 border-t border-slate-200 pt-3">Kelola Daftar Tahun Ajaran</label>
                        <div className="flex gap-2">
                          <input type="text" value={newYear} onChange={e => setNewYear(e.target.value)} placeholder="Misal: 2027/2028" className="flex-1 px-3 py-2 bg-white border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm" />
                          <button type="button" onClick={handleAddYear} className="bg-slate-800 text-white px-3 py-2 rounded-lg text-sm font-medium hover:bg-slate-700 transition">Tambah</button>
                        </div>
                        <div className="flex items-center gap-2 mt-2 mb-3 px-1">
                           <input type="checkbox" id="copyDataCheck" checked={copyFromCurrent} onChange={e => setCopyFromCurrent(e.target.checked)} className="w-4 h-4 text-indigo-600 rounded border-slate-300 focus:ring-indigo-500" />
                           <label htmlFor="copyDataCheck" className="text-xs text-slate-600 font-medium cursor-pointer leading-tight">Salin Data Guru & Kategori dari Tahun <strong className="text-indigo-600">{selectedYear}</strong> ke Tahun Baru</label>
                        </div>
                        
                        <div className="flex flex-wrap gap-2 max-h-32 overflow-y-auto p-1 bg-white border border-slate-200 rounded-lg min-h-[40px]">
                          {formData.availableYears && formData.availableYears.map(y => (
                             <span key={y} className="inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-md bg-slate-50 border border-slate-200 shadow-sm text-xs font-medium text-slate-700">
                               {y}
                               <button type="button" onClick={() => handleDeleteYear(y)} className="text-slate-400 hover:text-red-500 transition-colors"><X className="w-3 h-3" /></button>
                             </span>
                          ))}
                        </div>
                     </div>
                  </div>
                </div>
                <div className="pt-4 flex items-center justify-between border-t border-slate-100 mt-6">
                  <span className={`text-sm font-medium ${saveMessage.includes('berhasil') ? 'text-emerald-600' : 'text-red-600'}`}>{saveMessage}</span>
                  <button type="submit" className="px-6 py-3 rounded-xl bg-indigo-600 text-white font-medium hover:bg-indigo-700 shadow-sm transition flex items-center gap-2">
                    <Save className="w-5 h-5" /> Simpan Profil & Tahun Ajaran
                  </button>
                </div>
              </form>
            </div>
          </div>
        );
      };

      // --- Modal Supervisi (Dua Role) ---
      const SupervisionModal = () => {
        if (!selectedTeacher || !isSupervisionModalOpen) return null;

        const currentData = getTeacherSupervision(selectedTeacher.id);
        
        const [selfCheckedState, setSelfCheckedState] = useState(currentData.selfEvaluatedItems || []);
        const [verifiedCheckedState, setVerifiedCheckedState] = useState(currentData.verifiedItems || []);
        const [linkState, setLinkState] = useState(currentData.driveLink || '');
        const [notesState, setNotesState] = useState(currentData.principalNotes || '');

        const handleToggleSelfSingle = (id) => {
          if(isAdmin) return;
          setSelfCheckedState(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);
        };
        const handleToggleSelfMain = (subIds) => {
          if(isAdmin) return;
          const allChecked = subIds.every(id => selfCheckedState.includes(id));
          if (allChecked) setSelfCheckedState(prev => prev.filter(id => !subIds.includes(id)));
          else {
             const newState = [...selfCheckedState];
             subIds.forEach(id => { if(!newState.includes(id)) newState.push(id); });
             setSelfCheckedState(newState);
          }
        };

        const handleToggleVerifSingle = (id) => {
          if(isGuru) return;
          setVerifiedCheckedState(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);
        };
        const handleToggleVerifMain = (subIds) => {
          if(isGuru) return;
          const allChecked = subIds.every(id => verifiedCheckedState.includes(id));
          if (allChecked) setVerifiedCheckedState(prev => prev.filter(id => !subIds.includes(id)));
          else {
             const newState = [...verifiedCheckedState];
             subIds.forEach(id => { if(!newState.includes(id)) newState.push(id); });
             setVerifiedCheckedState(newState);
          }
        };

        const handleSave = async () => {
          const newId = currentData.id || Date.now().toString();
          const newSupervision = {
            id: newId,
            teacherId: selectedTeacher.id,
            academicYear: selectedYear,
            selfEvaluatedItems: selfCheckedState,
            verifiedItems: verifiedCheckedState,
            driveLink: linkState,
            principalNotes: notesState
          };

          try {
             const { doc, setDoc } = window.FirebaseSDK;
             await setDoc(doc(db, "supervisions", newId), newSupervision);
             setIsSupervisionModalOpen(false);
          } catch(err) { alert("Gagal menyimpan ke Firebase: " + err.message); }
        };

        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4 animate-in fade-in">
            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
              <div className="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <div>
                  <h3 className="text-xl font-bold text-slate-800">{isGuru ? 'Formulir Evaluasi Diri' : 'Formulir Verifikasi Supervisi'}</h3>
                  <p className="text-sm font-semibold text-indigo-600 mt-0.5">Guru: {selectedTeacher.name}</p>
                </div>
                <button onClick={() => setIsSupervisionModalOpen(false)} className="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-200 rounded-full transition"><X className="w-5 h-5" /></button>
              </div>

              <div className="p-6 overflow-y-auto flex-1">
                {isAdmin && (
                  <div className="mb-6 p-4 bg-blue-50 border border-blue-100 rounded-xl">
                     <p className="text-sm text-blue-800">
                        <strong>Petunjuk Admin:</strong> Item yang dicentang dan diajukan oleh guru ditandai dengan label <span className="inline-block text-[10px] bg-blue-200 text-blue-800 px-1.5 py-0.5 rounded font-bold ml-1">Diajukan Guru</span>. Silakan centang kotak utama untuk memverifikasi.
                     </p>
                  </div>
                )}
                {isGuru && (
                  <div className="mb-6 p-4 bg-amber-50 border border-amber-100 rounded-xl">
                     <p className="text-sm text-amber-800">
                        <strong>Petunjuk Guru:</strong> Silakan centang persiapan yang telah Anda lakukan dan sematkan tautan dokumen/RPP Anda di bawah.
                     </p>
                  </div>
                )}

                <div className="mb-6">
                  <label className="block text-sm font-semibold text-slate-700 mb-3 flex items-center gap-2"><Activity className="w-4 h-4 text-indigo-500" /> Checklist Tahapan Supervisi</label>
                  {currentCategories.length === 0 ? (
                    <p className="text-sm text-amber-600 bg-amber-50 p-3 rounded-xl border border-amber-100">Kategori supervisi belum ditambahkan di Data Master pada tahun ajaran ini.</p>
                  ) : (
                    <div className="space-y-4">
                      {currentCategories.map(cat => {
                        const hasSubs = cat.subCategories && cat.subCategories.length > 0;

                        if (!hasSubs) {
                          const isSelfChecked = selfCheckedState.includes(cat.id);
                          const isVerifChecked = verifiedCheckedState.includes(cat.id);
                          const isCheckedForInput = isGuru ? isSelfChecked : isVerifChecked;
                          const handleChange = isGuru ? () => handleToggleSelfSingle(cat.id) : () => handleToggleVerifSingle(cat.id);

                          return (
                            <label key={cat.id} className={`flex items-center justify-between p-4 rounded-xl border cursor-pointer transition-all ${isCheckedForInput ? 'border-indigo-400 bg-indigo-50/30' : 'border-slate-200 hover:border-slate-300'}`}>
                              <div className="flex items-center gap-3">
                                <div className="relative flex items-center justify-center">
                                  <input type="checkbox" checked={isCheckedForInput} onChange={handleChange} className="w-5 h-5 appearance-none border-2 border-slate-300 rounded-md checked:bg-indigo-600 checked:border-indigo-600 transition-colors cursor-pointer" />
                                  {isCheckedForInput && <CheckCircle className="w-3.5 h-3.5 text-white absolute pointer-events-none" />}
                                </div>
                                <span className={`font-semibold ${isCheckedForInput ? 'text-indigo-900' : 'text-slate-700'}`}>{cat.name}</span>
                              </div>
                              {isAdmin && isSelfChecked && <span className="text-[10px] bg-blue-100 text-blue-700 px-2 py-1 rounded font-bold uppercase tracking-wider">Diajukan Guru</span>}
                              {isGuru && isVerifChecked && <span className="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-1 rounded font-bold uppercase tracking-wider"><CheckCircle className="w-3 h-3 inline mr-1"/>Terverifikasi</span>}
                            </label>
                          )
                        } else {
                          const subIds = cat.subCategories.map(s => s.id);
                          const allSelfChecked = subIds.every(id => selfCheckedState.includes(id));
                          const someSelfChecked = subIds.some(id => selfCheckedState.includes(id));
                          const allVerifChecked = subIds.every(id => verifiedCheckedState.includes(id));
                          const someVerifChecked = subIds.some(id => verifiedCheckedState.includes(id));

                          const allCheckedForInput = isGuru ? allSelfChecked : allVerifChecked;
                          const someCheckedForInput = isGuru ? someSelfChecked : someVerifChecked;
                          const handleChangeMain = isGuru ? () => handleToggleSelfMain(subIds) : () => handleToggleVerifMain(subIds);

                          return (
                            <div key={cat.id} className="border border-slate-200 rounded-xl overflow-hidden bg-white shadow-sm">
                              <label className={`flex items-center justify-between p-4 border-b border-slate-100 cursor-pointer transition-colors bg-slate-50 hover:bg-slate-100`}>
                                <div className="flex items-center gap-3">
                                  <div className="relative flex items-center justify-center">
                                    <input type="checkbox" checked={allCheckedForInput} ref={el => { if(el) el.indeterminate = someCheckedForInput && !allCheckedForInput }} onChange={handleChangeMain} className="w-5 h-5 appearance-none border-2 border-slate-300 rounded-md checked:bg-indigo-600 checked:border-indigo-600 transition-colors cursor-pointer" />
                                    {allCheckedForInput && <CheckCircle className="w-3.5 h-3.5 text-white absolute pointer-events-none" />}
                                  </div>
                                  <span className={`font-bold text-slate-800`}>{cat.name}</span>
                                </div>
                              </label>
                              <div className="p-2 pl-12 bg-white flex flex-col gap-1">
                                {cat.subCategories.map(sub => {
                                  const isSelfSubChecked = selfCheckedState.includes(sub.id);
                                  const isVerifSubChecked = verifiedCheckedState.includes(sub.id);
                                  const isCheckedSubForInput = isGuru ? isSelfSubChecked : isVerifSubChecked;
                                  const handleChangeSub = isGuru ? () => handleToggleSelfSingle(sub.id) : () => handleToggleVerifSingle(sub.id);

                                  return (
                                    <label key={sub.id} className="flex items-center justify-between p-2 rounded-lg hover:bg-slate-50 cursor-pointer transition-colors">
                                      <div className="flex items-center gap-3">
                                        <div className="relative flex items-center justify-center">
                                          <input type="checkbox" checked={isCheckedSubForInput} onChange={handleChangeSub} className={`w-4 h-4 appearance-none border-2 border-slate-300 rounded transition-colors cursor-pointer ${isGuru ? 'checked:bg-indigo-500 checked:border-indigo-500' : 'checked:bg-emerald-500 checked:border-emerald-500'}`} />
                                          {isCheckedSubForInput && <CheckCircle className="w-2.5 h-2.5 text-white absolute pointer-events-none" />}
                                        </div>
                                        <span className={`text-sm ${isCheckedSubForInput ? (isGuru ? 'text-indigo-700 font-medium' : 'text-emerald-700 font-medium') : 'text-slate-600'}`}>{sub.name}</span>
                                      </div>
                                      {isAdmin && isSelfSubChecked && <span className="text-[10px] bg-blue-100 text-blue-700 px-2 py-1 rounded font-bold">Diajukan Guru</span>}
                                      {isGuru && isVerifSubChecked && <span className="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-1 rounded font-bold text-emerald-700"><CheckCircle className="w-3 h-3 inline mr-1"/>Terverifikasi</span>}
                                    </label>
                                  )
                                })}
                              </div>
                            </div>
                          )
                        }
                      })}
                    </div>
                  )}
                </div>

                <div>
                  <label className="block text-sm font-semibold text-slate-700 mb-3 flex items-center gap-2"><FolderOpen className="w-4 h-4 text-indigo-500" /> Tautan Dokumen (Google Drive / Lainnya)</label>
                  <div className="relative mb-6">
                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><LinkIcon className="h-5 w-5 text-slate-400" /></div>
                    <input type="url" value={linkState} onChange={(e) => setLinkState(e.target.value)} readOnly={isAdmin} className={`block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors ${isAdmin ? 'bg-slate-100 text-slate-600 cursor-not-allowed' : 'bg-slate-50 focus:bg-white'}`} placeholder="https://drive.google.com/..." />
                  </div>

                  <label className="block text-sm font-semibold text-slate-700 mb-3 flex items-center gap-2"><AlignLeft className="w-4 h-4 text-indigo-500" /> Catatan & Rekomendasi Supervisor</label>
                  <textarea value={notesState} onChange={(e) => setNotesState(e.target.value)} readOnly={isGuru} className={`block w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors ${isGuru ? 'bg-slate-100 text-slate-600 cursor-not-allowed' : 'bg-slate-50 focus:bg-white'}`} placeholder="Tambahkan catatan, evaluasi, atau rekomendasi..." rows="4"></textarea>
                </div>
              </div>

              <div className="px-6 py-4 border-t border-slate-100 bg-slate-50 flex justify-end gap-3">
                <button onClick={() => setIsSupervisionModalOpen(false)} className="px-5 py-2.5 rounded-xl text-slate-600 font-medium hover:bg-slate-200 transition">Batal</button>
                <button onClick={handleSave} className="px-5 py-2.5 rounded-xl bg-indigo-600 text-white font-medium hover:bg-indigo-700 shadow-sm transition flex items-center gap-2">
                   <Save className="w-4 h-4" /> {isGuru ? 'Ajukan Evaluasi' : 'Simpan Verifikasi'}
                </button>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="flex min-h-screen bg-slate-50 font-sans text-slate-900">
          <Sidebar />
          <main className="flex-1 overflow-y-auto h-screen relative">
            
            {/* Indikator Status Firebase */}
            <div className="absolute top-6 right-8 z-50 flex items-center gap-2 bg-white/80 backdrop-blur-sm shadow-sm border border-slate-200 px-3 py-1.5 rounded-full pointer-events-none">
              <span className={`w-2.5 h-2.5 rounded-full ${isFirebaseReady ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)] animate-pulse' : 'bg-slate-400'}`}></span>
              <span className="text-[10px] font-bold tracking-wider text-slate-700">{isFirebaseReady ? 'ONLINE (FIREBASE)' : 'MODE LOKAL'}</span>
            </div>

            {activeTab === 'dashboard' && <Dashboard />}
            {activeTab === 'teachers' && isAdmin && <TeachersData />}
            {activeTab === 'schedules' && <ScheduleData />}
            {activeTab === 'school' && isAdmin && <SchoolData />}
            {activeTab === 'master' && isAdmin && <MasterData />}
            {activeTab === 'reports' && isAdmin && <ReportsData />}
          </main>
          <SupervisionModal />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
