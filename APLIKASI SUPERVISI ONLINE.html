<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Supervisi Guru (SISA)</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome untuk Ikon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel untuk menjalankan JSX di browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase SDK untuk Persiapan Backend -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    window.FirebaseSDK = {
      initializeApp, getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged,
      getFirestore, collection, doc, setDoc, getDoc, onSnapshot, updateDoc, deleteDoc
    };
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* Indeterminate Checkbox Style */
    input[type="checkbox"]:indeterminate {
      background-color: #6366f1;
      border-color: #6366f1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='3' y='7' width='10' height='2' rx='1'/%3E%3C/svg%3E");
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
    }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useMemo, useRef } = React;

    // --- Konfigurasi Ikon FontAwesome ---
    const createIcon = (iconClass) => ({ className, ...props }) => {
      let sizeClass = 'text-base';
      if (className?.includes('w-3.5')) sizeClass = 'text-sm';
      else if (className?.includes('w-4')) sizeClass = 'text-base';
      else if (className?.includes('w-5')) sizeClass = 'text-lg';
      else if (className?.includes('w-6')) sizeClass = 'text-xl';
      else if (className?.includes('w-7')) sizeClass = 'text-2xl';
      else if (className?.includes('w-8')) sizeClass = 'text-3xl';
      else if (className?.includes('w-10')) sizeClass = 'text-4xl';

      const cleanedClass = className ? className.replace(/w-\d+(\.\d+)?|h-\d+(\.\d+)?/g, '').trim() : '';
      return <i className={`fa-solid ${iconClass} ${sizeClass} ${cleanedClass}`} {...props}></i>;
    };

    const Users = createIcon('fa-users');
    const Settings = createIcon('fa-cog');
    const Plus = createIcon('fa-plus');
    const X = createIcon('fa-times');
    const CheckCircle = createIcon('fa-check-circle');
    const Activity = createIcon('fa-chart-line');
    const BookOpen = createIcon('fa-book-open');
    const LayoutDashboard = createIcon('fa-table-columns');
    const Trash2 = createIcon('fa-trash');
    const FolderOpen = createIcon('fa-folder-open');
    const LinkIcon = createIcon('fa-link');
    const AlertCircle = createIcon('fa-exclamation-circle');
    const Building2 = createIcon('fa-building');
    const AlignLeft = createIcon('fa-align-left');
    const Download = createIcon('fa-download');
    const Upload = createIcon('fa-upload');
    const FileText = createIcon('fa-file-pdf');
    const BarChart2 = createIcon('fa-chart-bar');
    const Database = createIcon('fa-database');
    const UserCircle = createIcon('fa-user-tie');
    const Pen = createIcon('fa-pen');
    const Save = createIcon('fa-save');
    const Printer = createIcon('fa-print');
    const ClipboardList = createIcon('fa-clipboard-list');
    const LevelDownAlt = createIcon('fa-level-down-alt');
    const Calendar = createIcon('fa-calendar-alt');
    const LogOut = createIcon('fa-sign-out-alt');
    const Key = createIcon('fa-key');

    // --- Komponen Utama Aplikasi ---
    function App() {
      // --- State Auth ---
      const [currentUser, setCurrentUser] = useState(null);

      // --- State Utama ---
      const [schoolInfo, setSchoolInfo] = useState({ 
        name: '', address: '', activeYear: '2025/2026', availableYears: ['2024/2025', '2025/2026', '2026/2027'], wakasekName: '' 
      });
      const [teachers, setTeachers] = useState([]);
      const [categories, setCategories] = useState([]); 
      const [supervisions, setSupervisions] = useState([]); 
      const [schedules, setSchedules] = useState([]); 
      
      const [activeTab, setActiveTab] = useState('dashboard');
      const [selectedYear, setSelectedYear] = useState('2025/2026');
      
      const [selectedTeacher, setSelectedTeacher] = useState(null);
      const [isSupervisionModalOpen, setIsSupervisionModalOpen] = useState(false);
      const fileInputRef = useRef(null);

      // --- PERSIAPAN BACKEND FIREBASE ---
      const [isFirebaseReady, setIsFirebaseReady] = useState(false);
      const [db, setDb] = useState(null);

      useEffect(() => {
        if (window.FirebaseSDK) {
           try {
             const { initializeApp, getAuth, onAuthStateChanged, getFirestore, doc, getDoc } = window.FirebaseSDK;
             
             const firebaseConfig = {
               apiKey: "AIzaSyA6s-Dl45Sms932s9EI-Qb4EU2-xnDrTZ4",
               authDomain: "supervisi-app.firebaseapp.com",
               projectId: "supervisi-app",
               storageBucket: "supervisi-app.firebasestorage.app",
               messagingSenderId: "518857730915",
               appId: "1:518857730915:web:45107a1fb5798a65f30156",
               measurementId: "G-GVL4RCMGBN"
             };
             
             const app = window.firebaseAppInstance || initializeApp(firebaseConfig);
             window.firebaseAppInstance = app;
             
             const auth = getAuth(app);
             const firestoreDb = getFirestore(app);
             setDb(firestoreDb);

             const unsubscribe = onAuthStateChanged(auth, async (user) => {
               if (user) {
                  setIsFirebaseReady(true);
                  const username = user.email.split('@')[0];
                  if (username === 'admin') {
                     setCurrentUser({ id: 'admin', name: 'Administrator', role: 'admin' });
                  } else {
                     // Ambil nama lengkap guru dari Firestore berdasarkan UID otentikasinya
                     const docSnap = await getDoc(doc(firestoreDb, "teachers", user.uid));
                     if (docSnap.exists()) {
                        setCurrentUser({ id: user.uid, name: docSnap.data().name, role: 'guru' });
                     } else {
                        setCurrentUser({ id: user.uid, name: username, role: 'guru' });
                     }
                  }
               } else {
                  setIsFirebaseReady(false);
                  setCurrentUser(null);
               }
             });
             return () => unsubscribe();
           } catch (err) { console.warn("Kesalahan inisialisasi Firebase: ", err); }
        }
      }, []);

      // --- FIREBASE REALTIME SYNC (MENDENGARKAN PERUBAHAN DATABASE) ---
      useEffect(() => {
        if (!db || !isFirebaseReady || !window.FirebaseSDK) return;
        const { collection, doc, onSnapshot } = window.FirebaseSDK;

        // 1. Sync Profil Sekolah
        const unsubSchool = onSnapshot(doc(db, "schoolInfo", "main"), (docSnap) => {
          if (docSnap.exists()) setSchoolInfo(docSnap.data());
        }, err => console.error(err));

        // 2. Sync Guru
        const unsubTeachers = onSnapshot(collection(db, "teachers"), (snap) => {
          setTeachers(snap.docs.map(d => d.data()));
        }, err => console.error(err));

        // 3. Sync Kategori
        const unsubCategories = onSnapshot(collection(db, "categories"), (snap) => {
          setCategories(snap.docs.map(d => d.data()));
        }, err => console.error(err));

        // 4. Sync Hasil Supervisi
        const unsubSupervisions = onSnapshot(collection(db, "supervisions"), (snap) => {
          setSupervisions(snap.docs.map(d => d.data()));
        }, err => console.error(err));

        // 5. Sync Jadwal
        const unsubSchedules = onSnapshot(collection(db, "schedules"), (snap) => {
          setSchedules(snap.docs.map(d => d.data()));
        }, err => console.error(err));

        return () => {
          unsubSchool(); unsubTeachers(); unsubCategories(); unsubSupervisions(); unsubSchedules();
        };
      }, [db, isFirebaseReady]);

      // 1. Set default selected year saat load pertama kali
      useEffect(() => {
        if(schoolInfo.activeYear) {
          setSelectedYear(schoolInfo.activeYear);
        }
      }, [schoolInfo.activeYear]);

      // 2. Backward Compatibility Lokal
      useEffect(() => {
        // Hanya berlaku untuk struktur memori lokal agar tidak error. Database Firebase di-manage oleh Admin.
        let modified = false;
        const updatedTeachers = teachers.map(t => {
          if (!t.academicYear) { modified = true; return {...t, academicYear: '2025/2026'}; }
          return t;
        });
        if (modified) setTeachers(updatedTeachers);
      }, [teachers]);

      // --- LOGIKA ISOLASI TAHUN AJARAN ---
      const currentTeachers = useMemo(() => teachers.filter(t => t.academicYear === selectedYear), [teachers, selectedYear]);
      const currentCategories = useMemo(() => categories.filter(c => c.academicYear === selectedYear), [categories, selectedYear]);
      const currentSchedules = useMemo(() => schedules.filter(s => s.academicYear === selectedYear), [schedules, selectedYear]);
      const currentSupervisions = useMemo(() => supervisions.filter(s => s.academicYear === selectedYear), [supervisions, selectedYear]);

      // --- Logika Auth ---
      const handleLogin = async (username, password) => {
        const email = `${username.toLowerCase().trim()}@supervisi.app`;
        try {
          const { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } = window.FirebaseSDK;
          const auth = getAuth();
          try {
             await signInWithEmailAndPassword(auth, email, password);
             setActiveTab('dashboard');
          } catch (err) {
             // Fitur khusus: Auto-create akun admin jika belum ada (hanya untuk kemudahan setup pertama)
             if (username === 'admin' && password === 'admin' && err.code === 'auth/user-not-found') {
                await createUserWithEmailAndPassword(auth, email, password);
                setActiveTab('dashboard');
             } else {
                throw err;
             }
          }
        } catch(err) {
          let msg = err.message;
          if(err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password') msg = 'Username atau password salah!';
          if(err.code === 'auth/user-not-found') msg = 'Akun belum terdaftar!';
          alert('Gagal Masuk: ' + msg);
        }
      };

      const handleLogout = async () => {
        try {
           const { getAuth, signOut } = window.FirebaseSDK;
           await signOut(getAuth());
           setCurrentUser(null);
           setActiveTab('dashboard');
        } catch (err) { console.error(err); }
      };

      // --- Logika Kalkulasi Progress ---
      const getCheckableItems = useMemo(() => {
        let items = [];
        currentCategories.forEach(cat => {
          if (!cat.subCategories || cat.subCategories.length === 0) { items.push(cat.id); } 
          else { cat.subCategories.forEach(sub => items.push(sub.id)); }
        });
        return items;
      }, [currentCategories]);

      const getTeacherSupervision = (teacherId) => {
        const sup = currentSupervisions.find(s => s.teacherId === teacherId);
        return sup || { selfEvaluatedItems: [], verifiedItems: [], driveLink: '', principalNotes: '' };
      };

      const getTeacherProgress = (teacherId) => {
        const supervision = getTeacherSupervision(teacherId);
        const completedItems = supervision.verifiedItems || [];
        const selfItems = supervision.selfEvaluatedItems || [];
        
        let totalEarnedPercentage = 0; let totalItems = 0; let completedItemCount = 0;

        currentCategories.forEach(cat => {
          const weight = Number(cat.weight) || 0; 
          const hasSubs = cat.subCategories && cat.subCategories.length > 0;
          if (!hasSubs) {
            totalItems++;
            if (completedItems.includes(cat.id)) { totalEarnedPercentage += weight; completedItemCount++; }
          } else {
            const subWeight = weight / cat.subCategories.length;
            cat.subCategories.forEach(sub => {
              totalItems++;
              if (completedItems.includes(sub.id)) { totalEarnedPercentage += subWeight; completedItemCount++; }
            });
          }
        });

        const percentage = Math.min(Math.round(totalEarnedPercentage), 100);
        const isPendingVerif = selfItems.length > 0 && percentage < 100;

        return { completed: completedItemCount, total: totalItems, percentage, isPendingVerif };
      };

      const overallProgress = useMemo(() => {
        if (currentTeachers.length === 0 || currentCategories.length === 0) return 0;
        let totalPercentage = 0;
        currentTeachers.forEach(t => { totalPercentage += getTeacherProgress(t.id).percentage; });
        return Math.round(totalPercentage / currentTeachers.length);
      }, [currentTeachers, currentCategories, currentSupervisions, selectedYear]);

      const teacherStats = useMemo(() => {
        let complete = 0, inProgress = 0, notStarted = 0;
        currentTeachers.forEach(t => {
          const p = getTeacherProgress(t.id).percentage;
          if (p === 100) complete++;
          else if (p > 0) inProgress++;
          else notStarted++;
        });
        return { complete, inProgress, notStarted, total: currentTeachers.length || 1 };
      }, [currentTeachers, currentCategories, currentSupervisions, selectedYear]);

      // --- Komponen Login ---
      if (!currentUser) {
         const LoginScreen = () => {
           const [user, setUser] = useState('');
           const [pass, setPass] = useState('');
           const [showPassword, setShowPassword] = useState(false);
           return (
             <div className="min-h-screen bg-slate-100 flex flex-col justify-center items-center p-4">
               <div className="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden relative">
                 
                 {/* Indikator Status Firebase di Login */}
                 <div className="absolute top-4 right-4 flex items-center gap-1.5 bg-white/20 backdrop-blur-md px-2.5 py-1 rounded-full border border-white/10 z-10">
                   <span className={`w-2 h-2 rounded-full ${isFirebaseReady ? 'bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.8)] animate-pulse' : 'bg-slate-300'}`}></span>
                   <span className="text-[9px] font-bold tracking-wider text-white">{isFirebaseReady ? 'DB TERHUBUNG' : 'MEMUAT DB...'}</span>
                 </div>

                 <div className="bg-indigo-600 p-8 text-center pt-10">
                    <BookOpen className="w-12 h-12 text-white mx-auto mb-3" />
                    <h1 className="text-3xl font-bold text-white tracking-tight">SISA</h1>
                    <p className="text-indigo-100 mt-2 text-sm font-medium">Sistem Informasi Supervisi Akademik</p>
                 </div>
                 <div className="p-8">
                    <form onSubmit={(e) => { e.preventDefault(); handleLogin(user, pass); }}>
                       <div className="mb-5">
                          <label className="block text-sm font-semibold text-slate-700 mb-2">Username</label>
                          <input type="text" value={user} onChange={e=>setUser(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500" required placeholder="Masukkan username..." autoFocus />
                       </div>
                       <div className="mb-6">
                          <label className="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                          <input type={showPassword ? "text" : "password"} value={pass} onChange={e=>setPass(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500" required placeholder="••••••••" />
                          <div className="mt-3 flex items-center gap-2 px-1">
                             <input type="checkbox" id="showPass" checked={showPassword} onChange={() => setShowPassword(!showPassword)} className="w-4 h-4 text-indigo-600 rounded border-slate-300 focus:ring-indigo-500 cursor-pointer" />
                             <label htmlFor="showPass" className="text-sm text-slate-600 cursor-pointer font-medium select-none">Tampilkan Password</label>
                          </div>
                       </div>
                       <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition shadow-md flex justify-center items-center gap-2">
                         Masuk Sistem <LogOut className="w-4 h-4" />
                       </button>
                    </form>
                    <div className="mt-6 p-4 bg-amber-50 rounded-xl border border-amber-100 text-xs text-amber-800 text-center">
                       <p className="font-semibold mb-1">Informasi Akses Tes:</p>
                       <p>Admin -> User: <strong>admin</strong> | Pass: <strong>admin</strong></p>
                    </div>
                 </div>
               </div>
             </div>
           );
         };
         return <LoginScreen />;
      }

      const isAdmin = currentUser.role === 'admin';
      const isGuru = currentUser.role === 'guru';

      // --- Fitur Ekspor & Impor CSV Data Guru (Menyimpan ke Firestore) ---
      const handleExportTeacherCSV = () => {
        const headers = ['ID', 'Nama Lengkap', 'Username', 'Password', 'Tahun Ajaran'];
        const safeStr = (str) => `"${(str || '').replace(/"/g, '""')}"`;
        const rows = teachers.map(t => [t.id, safeStr(t.name), safeStr(t.username), safeStr(t.password), safeStr(t.academicYear)].join(','));
        const csvStr = "data:text/csv;charset=utf-8," + encodeURIComponent([headers.join(','), ...rows].join('\n'));
        const dl = document.createElement('a'); dl.setAttribute("href", csvStr); dl.setAttribute("download", `Data_Guru_SISA_${selectedYear.replace('/', '-')}.csv`);
        document.body.appendChild(dl); dl.click(); dl.remove();
      };

      const handleImportTeacherCSV = async (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            const text = e.target.result;
            const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
            if (lines.length < 2) { alert("File CSV kosong atau format salah."); return; }

            const parseCSVRow = (str) => {
                const result = []; let current = ''; let inQuotes = false;
                for (let i = 0; i < str.length; i++) {
                    let char = str[i];
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; } 
                    else current += char;
                }
                result.push(current.trim()); return result;
            };

            const newTeachers = [];
            for(let i = 1; i < lines.length; i++) {
               const row = parseCSVRow(lines[i]);
               if (row.length >= 5) {
                  newTeachers.push({
                     id: row[0] || Date.now().toString() + i,
                     name: row[1], username: row[2].toLowerCase().trim(), password: row[3], academicYear: row[4] || selectedYear
                  });
               }
            }

            if (newTeachers.length > 0 && confirm(`Ditemukan ${newTeachers.length} data guru dalam CSV. Impor ke Database Firebase?`)) {
               const { initializeApp, getAuth, createUserWithEmailAndPassword, doc, setDoc } = window.FirebaseSDK;
               
               // Gunakan instance Firebase terpisah (Secondary) agar Admin tidak ter-logout saat membuat user baru
               const firebaseConfig = { apiKey: "AIzaSyA6s-Dl45Sms932s9EI-Qb4EU2-xnDrTZ4", authDomain: "supervisi-app.firebaseapp.com", projectId: "supervisi-app" };
               const secondaryApp = window.secondaryFirebaseApp || initializeApp(firebaseConfig, "SecondaryApp");
               window.secondaryFirebaseApp = secondaryApp;
               const secondaryAuth = getAuth(secondaryApp);

               for(let nt of newTeachers) {
                  try {
                     const email = `${nt.username}@supervisi.app`;
                     let newId = nt.id;
                     try {
                        const userCred = await createUserWithEmailAndPassword(secondaryAuth, email, nt.password);
                        newId = userCred.user.uid; // Ikat UID Firebase ke ID Guru
                     } catch(err) {
                        if(err.code !== 'auth/email-already-in-use') console.warn(err);
                     }
                     nt.id = newId;
                     await setDoc(doc(db, "teachers", newId), nt);
                  } catch(e) { console.warn("Error import user:", e); }
               }
               await secondaryAuth.signOut();
               alert('Data guru berhasil diimpor ke Firebase!');
            }
          } catch (err) { alert('Gagal Impor: ' + err.message); }
          if (fileInputRef.current) fileInputRef.current.value = "";
        };
        reader.readAsText(file);
      };

      // --- Helper HTML Laporan ---
      const getSignatureHTML = () => `
        <div style="float: right; width: 300px; text-align: center; margin-top: 50px; font-size: 14px;">
          <p style="margin: 0;">Mengetahui,</p>
          <p style="margin: 0;"><strong>WAKASEK KURIKULUM</strong></p>
          <br><br><br><br>
          <p style="margin: 0; font-weight: bold; text-decoration: underline;">
            ${schoolInfo.wakasekName ? schoolInfo.wakasekName.toUpperCase() : '...........................................'}
          </p>
        </div>
        <div style="clear: both;"></div>
      `;

      const getHeaderHTML = (title) => `
        <div style="text-align: center; border-bottom: 3px solid #111; padding-bottom: 15px; margin-bottom: 30px;">
          <h1 style="margin: 0; font-size: 24px; text-transform: uppercase; color: #111;">${schoolInfo.name || 'NAMA SEKOLAH BELUM DIISI'}</h1>
          <p style="margin: 5px 0 0 0; font-size: 14px; color: #444;">${schoolInfo.address || 'Alamat sekolah belum diisi'}</p>
        </div>
        <div style="text-align: center; margin-bottom: 30px;">
          <h2 style="margin: 0; font-size: 18px; text-transform: uppercase;">${title}</h2>
          <p style="margin: 5px 0 0 0; font-size: 14px;">Tahun Ajaran: ${selectedYear}</p>
        </div>
      `;

      // --- Fitur Laporan Keseluruhan ---
      const handleExportCSV = () => {
        const headers = ['Nama Guru', 'Progres Terverifikasi (%)', 'Item Selesai', 'Total Item', 'Status', 'Catatan Supervisor'];
        const rows = currentTeachers.map(t => {
          const prog = getTeacherProgress(t.id);
          const sup = getTeacherSupervision(t.id);
          const status = prog.percentage === 100 ? 'Selesai' : prog.percentage > 0 ? 'Sedang Berjalan' : 'Belum Mulai';
          return [ `"${t.name}"`, prog.percentage, prog.completed, prog.total, `"${status}"`, `"${(sup.principalNotes || '').replace(/"/g, '""')}"` ].join(',');
        });
        
        const csvContent = "data:text/csv;charset=utf-8," + [headers.join(','), ...rows].join('\n');
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a"); link.setAttribute("href", encodedUri); link.setAttribute("download", `Laporan_Supervisi_Keseluruhan_${selectedYear.replace('/', '-')}.csv`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      };

      const handleExportPDF = () => {
        const printWindow = window.open('', '_blank');
        if (!printWindow) { alert("Mohon izinkan pop-up pada browser Anda untuk mencetak PDF."); return; }
        
        const htmlContent = `
          <html>
            <head>
              <title>Laporan Supervisi Keseluruhan ${selectedYear}</title>
              <style>
                @media print { @page { margin: 2cm; } }
                body { font-family: 'Times New Roman', Times, serif; color: #000; padding: 20px; line-height: 1.5; }
                table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
                th, td { border: 1px solid #000; padding: 8px; text-align: left; vertical-align: top; }
                th { background-color: #f0f0f0; font-weight: bold; text-align: center; }
                .text-center { text-align: center; }
              </style>
            </head>
            <body>

                <h2 className="text-3xl font-bold text-slate-800 tracking-tight">Dashboard Supervisi</h2>
